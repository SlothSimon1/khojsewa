<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khoj Sewa - Find Services Near You</title>

<!-- ✅ Leaflet CSS (FREE MAP) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5;}

.layout{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;}
.maps-section{background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;}
#mapContainer{border-radius:12px;height:100%;min-height:calc(100vh - 40px);}

.info-section{background:white;padding:60px 40px;display:flex;flex-direction:column;justify-content:center;max-width:600px;margin:auto;}

h1{font-size:2.5em;margin-bottom:10px;}
.subtitle{margin-bottom:50px;color:#666;}

.button-group{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

.btn{padding:15px 30px;border:none;border-radius:10px;text-decoration:none;color:white;font-weight:600;display:inline-block;}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);}
.btn-secondary{background:linear-gradient(135deg,#f093fb,#f5576c);}

.auth-link{font-size:0.9em;}
.auth-link a{text-decoration:none;color:#667eea;}

.feature-list{margin-top:30px;padding-top:30px;border-top:1px solid #eee;}

@media(max-width:768px){
.layout{grid-template-columns:1fr;}
#mapContainer{min-height:300px;}
}
</style>
</head>

<body>

<div class="layout">

<!-- MAP -->
<div class="maps-section">
<div id="mapContainer"></div>
</div>

<!-- INFO -->
<div class="info-section">
<h1>🔧 Khoj Sewa</h1>
<p class="subtitle">Find trusted services near you instantly</p>

<div class="button-group">
<div>
<h3>Need a Service?</h3>
<a href="{% url 'register_user' %}" class="btn btn-primary">Register as User</a>
<p class="auth-link">Already have account? <a href="{% url 'login' %}">Login</a></p>
</div>

<div>
<h3>Provide Services?</h3>
<a href="{% url 'register_expert' %}" class="btn btn-secondary">Register as Expert</a>
<p class="auth-link">Already have account? <a href="{% url 'login' %}">Login</a></p>
</div>
</div>

<div class="feature-list">
<h3>Why Choose Khoj Sewa?</h3>
<ul>
<li>✓ Fast service providers</li>
<li>✓ Transparent pricing</li>
<li>✓ Real-time updates</li>

</ul>
</div>

</div>
</div>

<!-- ✅ Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // Default Nepal center
    const map = L.map('mapContainer').setView([28.3949, 84.1240], 7);

    // OpenStreetMap tiles (FREE)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Django data
    let experts = [];
    try {
        experts = JSON.parse('{{ experts_json|escapejs }}');
    } catch (e) {
        console.warn("No expert data");
    }

    if (experts.length === 0) return;

    const bounds = [];

    experts.forEach(expert => {
        const lat = parseFloat(expert.lat);
        const lng = parseFloat(expert.lng);

        const marker = L.marker([lat, lng]).addTo(map);

        marker.bindPopup(`
            <b>${expert.name}</b><br>
            ${expert.expertise}<br>
            ${expert.location}<br>
            📞 ${expert.phone}
        `);

        bounds.push([lat, lng]);
    });

    // Auto zoom
    map.fitBounds(bounds, { padding: [50, 50] });

});
</script>

</body>
</html>
